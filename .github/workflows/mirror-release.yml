name: Mirror Release to GitLab
on:
  release:
    types: [published]

jobs:
  mirror-release:
    runs-on: ubuntu-latest
    steps:
      - name: Sync release assets to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"

          # Get release body from GitHub API (avoids shell escaping issues)
          BODY=$(gh release view "$TAG" -R "${{ github.repository }}" --json body -q .body)

          # Create GitLab release with proper JSON escaping via jq
          curl --fail-with-body -X POST \
            "https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/releases" \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg tag "$TAG" --arg desc "$BODY" '{tag_name: $tag, description: $desc}')" || true

          # Download GitHub release assets
          mkdir -p /tmp/assets
          gh release download "$TAG" -D /tmp/assets -R "${{ github.repository }}" || exit 0

          # Upload each asset to GitLab
          for file in /tmp/assets/*; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")

            case "$filename" in
              *.sig|latest.json) echo "Skip: $filename"; continue ;;
            esac

            filesize=$(stat -c%s "$file")
            echo "Uploading: $filename ($(numfmt --to=iec $filesize))..."

            # Files >100MB use Package Registry, smaller use regular uploads
            if [ "$filesize" -gt 104857600 ]; then
              # Use Generic Package Registry for large files
              curl --http1.1 --fail-with-body -X PUT \
                "https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/packages/generic/botdrop-android/${TAG}/${filename}" \
                -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@${file}"

              asset_url="https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/packages/generic/botdrop-android/${TAG}/${filename}"
              link_type="package"
            else
              # Regular upload for smaller files
              upload_url=$(curl --http1.1 --fail-with-body -X POST \
                "https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/uploads" \
                -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
                -F "file=@${file}" | jq -r '.full_path')

              asset_url="https://gitlab.com${upload_url}"
              link_type="other"
            fi

            # Link to release
            curl --fail-with-body -X POST \
              "https://gitlab.com/api/v4/projects/${GITLAB_PROJECT_ID}/releases/${TAG}/assets/links" \
              -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${filename}\", \"url\": \"${asset_url}\", \"link_type\": \"${link_type}\"}"
          done
