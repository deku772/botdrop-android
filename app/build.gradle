    defaultConfig {
        applicationId "app.botdrop"
        minSdkVersion project.properties.minSdkVersion.toInteger()
        targetSdkVersion project.properties.targetSdkVersion.toInteger()
        versionCode 13
        versionName "0.2.11"

        if (appVersionName) versionName = appVersionName
        validateVersionName(versionName)

        buildConfigField "String", "TERMUX_PACKAGE_VARIANT", "\"" + project.ext.packageVariant + "\"" // Used by TermuxApplication class

        manifestPlaceholders.TERMUX_PACKAGE_NAME = "app.botdrop"
        manifestPlaceholders.TERMUX_APP_NAME = "BotDrop"
        manifestPlaceholders.TERMUX_API_APP_NAME = "BotDrop:API"
        manifestPlaceholders.TERMUX_BOOT_APP_NAME = "BotDrop:Boot"
        manifestPlaceholders.TERMUX_FLOAT_APP_NAME = "BotDrop:Float"
        manifestPlaceholders.TERMUX_STYLING_APP_NAME = "BotDrop:Styling"
        manifestPlaceholders.TERMUX_TASKER_APP_NAME = "BotDrop:Tasker"
        manifestPlaceholders.TERMUX_WIDGET_APP_NAME = "BotDrop:Widget"

        ndk {
