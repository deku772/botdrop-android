import org.gradle.api.file.RelativePath

plugins {
    id "com.android.application"
}

configurations.configureEach {
    resolutionStrategy.force "com.google.guava:guava:24.1-jre"
}

def hasGoogleServicesConfig = file("google-services.json").exists()
if (hasGoogleServicesConfig) {
    apply plugin: "com.google.firebase.crashlytics"
    apply plugin: "com.google.gms.google-services"
}

ext {
    // The packageVariant defines the bootstrap variant that will be included in the app APK.
    // This must be supported by com.termux.shared.termux.TermuxBootstrap.PackageVariant or app will
    // crash at startup.
    // Bootstrap of a different variant must not be manually installed by the user after app installation
    // by replacing $PREFIX since app code is dependant on the variant used to build the APK.
    // Currently supported values are: [ "apt-android-7" "apt-android-5" ]
    packageVariant = System.getenv("TERMUX_PACKAGE_VARIANT") ?: "apt-android-7" // Default: "apt-android-7"
}

def bundledOpenclawVersion = System.getenv("BOTDROP_BUNDLED_OPENCLAW_VERSION") ?: "2026.3.13"
def bundledOpenclawInstallSpec = "openclaw@" + bundledOpenclawVersion
def bundledOpenclawBundleTgz = System.getenv("BOTDROP_OPENCLAW_BUNDLE_TGZ") ?:
    (project.findProperty("botdropOpenclawBundleTgz") ?: "")
def bundledQqbotPluginTgz = System.getenv("BOTDROP_QQBOT_PLUGIN_TGZ") ?:
    (project.findProperty("botdropQqbotPluginTgz") ?: "")
def bundledQqbotPluginDir = System.getenv("BOTDROP_QQBOT_PLUGIN_DIR") ?:
    (project.findProperty("botdropQqbotPluginDir") ?: "")
def generatedOfflineOpenclawAssetsDir = file("$buildDir/generated/assets/offlineOpenclaw")

tasks.register("prepareBundledOpenclawAssets") {
    inputs.property("bundledOpenclawVersion", bundledOpenclawVersion)
    inputs.property("bundledOpenclawBundleTgz", bundledOpenclawBundleTgz)
    inputs.property("bundledQqbotPluginTgz", bundledQqbotPluginTgz)
    inputs.property("bundledQqbotPluginDir", bundledQqbotPluginDir)
    outputs.dir(generatedOfflineOpenclawAssetsDir)

    doLast {
        delete(generatedOfflineOpenclawAssetsDir)
        if (!bundledOpenclawBundleTgz) {
            logger.quiet("No BOTDROP_OPENCLAW_BUNDLE_TGZ configured, skipping offline OpenClaw assets")
            return
        }

        File runtimeArchive = file(bundledOpenclawBundleTgz)
        if (!runtimeArchive.exists()) {
            throw new GradleException("Bundled OpenClaw runtime archive not found: " + runtimeArchive)
        }

        File assetRoot = new File(generatedOfflineOpenclawAssetsDir, "offline-openclaw")
        assetRoot.mkdirs()

        copy {
            from runtimeArchive
            into assetRoot
            rename { "openclaw-runtime.tar" }
        }

        if (bundledQqbotPluginDir) {
            File qqbotDir = file(bundledQqbotPluginDir)
            if (!qqbotDir.exists() || !qqbotDir.isDirectory()) {
                throw new GradleException("Bundled QQ plugin directory not found: " + qqbotDir)
            }

            copy {
                from qqbotDir
                into new File(assetRoot, "qqbot")
                includeEmptyDirs = false
            }
        } else if (bundledQqbotPluginTgz) {
            File qqbotArchive = file(bundledQqbotPluginTgz)
            if (!qqbotArchive.exists()) {
                throw new GradleException("Bundled QQ plugin archive not found: " + qqbotArchive)
            }

            copy {
                from tarTree(resources.gzip(qqbotArchive))
                into new File(assetRoot, "qqbot")
                includeEmptyDirs = false
                eachFile { details ->
                    def segments = details.relativePath.segments
                    if (segments.length > 0 && segments[0] == "package") {
                        def trimmed = segments.length > 1 ? segments[1..-1] : [] as String[]
                        details.relativePath = new RelativePath(details.isDirectory(), trimmed)
                    }
                }
                exclude { details ->
                    details.relativePath.segments.length == 1 && details.relativePath.segments[0] == "package"
                }
            }
        }

        File manifestFile = new File(assetRoot, "manifest.properties")
        manifestFile.text =
            "version=${bundledOpenclawVersion}\n" +
            "installSpec=${bundledOpenclawInstallSpec}\n" +
            "runtimeArchive=openclaw-runtime.tar\n" +
            "qqbotDir=qqbot\n"

        logger.quiet("Prepared bundled OpenClaw assets in " + assetRoot)
    }
}

android {
